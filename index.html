<!DOCTYPE html>
<html lang="en">
<head>
    <base href="https://cdn.jsdelivr.net/gh/DominumNetwork/DominumCord@latest/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DominumCord</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <h2 class="login-header">Welcome back!</h2>
        <p class="login-subheader">We're so excited to see you again!</p>
        
        <div class="input-group">
            <label>EMAIL <span class="required">*</span></label>
            <input type="email" id="loginEmail" required>
        </div>
        
        <div class="input-group">
            <label>PASSWORD <span class="required">*</span></label>
            <input type="password" id="loginPassword" required>
        </div>
        
        <button id="emailLoginBtn" class="brand-btn">Log In</button>
        
        <div class="login-divider"><span>OR</span></div>
        
        <button id="googleLoginBtn" class="brand-btn google-btn">
            Log in with Google
        </button>
    </div>
</div>
    <div id="app">
        <div id="layout">

            <div id="serverList">
                <div class="server-item discord-logo">
                    <div class="pill active"></div>
                    <div class="icon-wrapper">D</div>
                </div>
                <div class="server-separator"></div>
                <div class="server-item">
                    <div class="pill"></div>
                    <div class="icon-wrapper">SV</div>
                </div>
                <div class="server-item add-server">
                    <div class="icon-wrapper">+</div>
                </div>
            </div>

            <div id="sidebar">
                <div class="sidebar-header">
                    DominumCord Server <span class="dropdown-icon">⌄</span>
                </div>
                <div id="channelList">
                    <div class="category-header">TEXT CHANNELS</div>
                    <div class="channel-item active">
                        <span class="hash">#</span> general
                    </div>
                    <div class="channel-item">
                        <span class="hash">#</span> development
                    </div>
                </div>
                <div id="dmList"></div>
                
                <div class="user-panel">
                    <div class="avatar"></div>
                    <div class="user-info">
                        <div class="username">Dominum</div>
                        <div class="status">Online</div>
                    </div>
                    <div class="user-controls">⚙️</div>
                </div>
            </div>

            <div id="chat">
                <div id="chatHeader">
                    <span class="hash header-hash">#</span> general
                </div>
                
                <div id="messages">
                    <div class="message-group">
                        <div class="message-avatar"></div>
                        <div class="message-content">
                            <div class="message-header">
                                <span class="message-username">Dominum</span>
                                <span class="message-timestamp">Today at 12:52 PM</span>
                            </div>
                            <div class="message-text">Welcome to the DominumCord Ultra rewrite!</div>
                        </div>
                    </div>
                </div>

                <div id="typing"></div>
                
                <div class="input-container">
                    <div id="inputBar">
                        <button id="uploadBtn">+</button>
                        <input id="messageInput" placeholder="Message #general">
                        <button id="emojiBtn">😀</button>
                    </div>
                </div>
            </div>

            <div id="memberList">
                <div class="member-category">ONLINE — 1</div>
                <div class="member-item">
                    <div class="avatar">
                        <div class="status-indicator online"></div>
                    </div>
                    <div class="member-name">Dominum</div>
                </div>
            </div>

        </div>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
